version: "2"

run:
  timeout: 5m

linters:
  exclusions:
    rules:
      - linters: [revive]
        text: "empty-block"
        path: _test\.go

  enable:
    # Core: bug detection
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # Error handling
    - errorlint
    - nilerr

    # Code quality
    - gocritic
    - revive
    - unconvert
    - wastedassign
    - copyloopvar
    - durationcheck
    - noctx
    - bodyclose
    - sqlclosecheck
    - perfsprint
    - prealloc
    - whitespace

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - rangeValCopy
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    errcheck:
      check-type-assertions: true
    perfsprint:
      err-error: true
      errorf: true
      sprintf1: true
    prealloc:
      simple: true
      for-loops: true
